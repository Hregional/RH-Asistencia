<div class="container">
    <div class="alert alert-error" *ngIf="error">
        {{ error }} <button (click)="error = null">&times;</button>
    </div>

    <div class="loading" *ngIf="loading && vistaActual === 'tabla'">Cargando...</div>

    <app-permisos-list *ngIf="vistaActual === 'tabla' && !loading" class="no-print" [loading]="loading"
        [searchTerm]="searchTerm" [filtroEstado]="filtroEstado" [paginatedPermisos]="paginatedPermisos"
        [filteredPermisos]="filteredPermisos" [currentPage]="currentPage" [totalPages]="totalPages"
        [itemsPerPage]="itemsPerPage" [popupObservaciones]="popupObservaciones"
        (searchTermChange)="searchTerm = $event; currentPage = 1; updatePagination()"
        (filtroEstadoChange)="filtroEstado = $event; currentPage = 1; updatePagination()"
        (solicitarPermiso)="irASolicitud()" (registrarTipoPermiso)="irATiposPermiso()"
        (editarPermiso)="irAEditarPermiso($event)" (autorizarPermiso)="cambiarEstado($event, 'AUTORIZADO')"
        (rechazarPermiso)="cambiarEstado($event, 'RECHAZADO')" (imprimirPermiso)="imprimirPermisoDirecto($event)"
        (mostrarObservaciones)="mostrarObservaciones($event.event, $event.permiso)" (cerrarPopup)="cerrarPopup()"
        (prevPage)="prevPage()" (nextPage)="nextPage()">
    </app-permisos-list>

    <app-permisos-form *ngIf="vistaActual === 'solicitud'" class="no-print" [mode]="'solicitud'"
        [tiposPermiso]="tiposPermiso" [solicitudForm]="solicitudForm" [empleadoBusqueda]="empleadoBusqueda"
        [empleadosFiltrados]="empleadosFiltrados" [empleadoSeleccionado]="empleadoSeleccionado" [loading]="loading"
        [diasExcedidos]="diasExcedidos" [esDiaUnico]="esDiaUnico" [hoy]="hoy" [cartaData]="cartaData"
        (empleadoBusquedaChange)="empleadoBusqueda = $event" (buscarEmpleado)="onEmpleadoBusqueda()"
        (seleccionarEmpleado)="seleccionarEmpleado($event)" (tipoPermisoChange)="onTipoPermisoChange()"
        (calcularDias)="calcularDias()" (guardarSolicitud)="guardarSolicitud()" (volver)="volverATabla()">
    </app-permisos-form>

    <app-permisos-form *ngIf="vistaActual === 'editarPermiso' && editingPermiso" class="no-print" [mode]="'editar'"
        [tiposPermiso]="tiposPermiso" [solicitudForm]="solicitudForm" [empleadoSeleccionado]="empleadoSeleccionado"
        [loading]="loading" [diasExcedidos]="diasExcedidos" [esDiaUnico]="esDiaUnico" [hoy]="hoy"
        [cartaData]="cartaData" [editingPermiso]="editingPermiso" (tipoPermisoChange)="onTipoPermisoChange()"
        (calcularDias)="calcularDias()" (actualizarPermiso)="actualizarPermiso()"
        (estadoChange)="cambiarEstadoEnEdicion($event)" (volver)="volverATabla()">
    </app-permisos-form>

    <app-permisos-tipos *ngIf="vistaActual === 'tiposPermiso'" class="no-print" [tiposPermiso]="tiposPermiso"
        [tipoPermisoForm]="tipoPermisoForm" [editingTipoPermiso]="editingTipoPermiso" [loading]="loading"
        (guardar)="guardarTipoPermiso()" (editar)="editarTipoPermiso($event)" (eliminar)="eliminarTipoPermiso($event)"
        (cancelar)="cancelarEdicionTipo()" (volver)="volverATabla()">
    </app-permisos-tipos>

    <div class="print-area" *ngIf="imprimiendoDesdeTabla">
        <app-permiso-carta [cartaData]="cartaData"></app-permiso-carta>
    </div>

    <div *ngIf="avisoModal" class="aviso-modal-overlay" (click)="avisoModal = null">
        <div class="aviso-modal" (click)="$event.stopPropagation()">
            <p>{{ avisoModal }}</p>
            <button class="btn btn-primary" (click)="avisoModal = null">Aceptar</button>
        </div>
    </div>
</div>
