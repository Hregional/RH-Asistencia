services:

  # --- Servicio de Base de Datos (MariaDB) ---
  db:
    image: mariadb:10.4.32
    container_name: biometrico_db
    restart: always
    environment:
      TZ: America/Guatemala
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} # Contraseña root desde .env
      MYSQL_DATABASE: sigsa_db # <-- CORREGIDO: Nombre de la DB que usa el backend
      MYSQL_USER: sigsa_user # <-- CORREGIDO: Usuario que usa el backend
      MYSQL_PASSWORD: ${DB_PASSWORD} # Contraseña leída desde .env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./Hospital.sql:/docker-entrypoint-initdb.d/Hospital.sql
    networks:
      - sigsa-net
    #expose:
    #  - '3306'
    ports:
      - "3308:3306"
    healthcheck:
      # <-- AÑADIDO: Chequeo de salud
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Servicio Backend (Node.js) ---
  backend:
    build:
      context: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy # <-- MEJORADO: Espera a que la DB esté saludable
    environment:
      TZ: America/Guatemala
      # --- Variables de Keycloak ---
      KEYCLOAK_AUTH_SERVER_URL: https://sso.hro.gob.gt
      KEYCLOAK_REALM: "Hospital-O"
      # KEYCLOAK_CLIENT_ID: 'tu-client-id-backend'
      # KEYCLOAK_SECRET: 'tu-client-secret'

      # --- Variables de Base de Datos ---
      DB_HOST: db
      DB_USER: sigsa_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: sigsa_db
      DB_PORT: 3306
    env_file:
      - ./.env
    expose:
      - "3000"

    networks:
      - sigsa-net

  # --- Servicio Frontend (Angular + Nginx Proxy) ---
  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "127.0.0.1:8020:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sigsa-net
    depends_on:
      - backend
    environment:
      TZ: America/Guatemala
      API_BASE: ${FRONTEND_API_BASE}
      KEYCLOAK_URL: ${FRONTEND_KEYCLOAK_URL}
      KEYCLOAK_REALM: ${FRONTEND_KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${FRONTEND_KEYCLOAK_CLIENT_ID}

networks:
  sigsa-net:
    driver: bridge

# --- Definición de Volúmenes ---
volumes:
  mariadb_data:
    driver: local
